<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>{{ name }} - Video Detail</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <meta content="Free HTML Templates" name="keywords">
    <meta content="Free HTML Templates" name="description">
    <link rel="stylesheet" href="../static/css/simplebar.css">
    <link href="https://fonts.googleapis.com/css2?family=Overpass:wght@100;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../static/css/feather.css">
    <link rel="stylesheet" href="../static/css/fullcalendar.css">
    <link rel="stylesheet" href="../static/css/select2.css">
    <link rel="stylesheet" href="../static/css/dropzone.css">
    <link rel="stylesheet" href="../static/css/uppy.min.css">
    <link rel="stylesheet" href="../static/css/jquery.steps.css">
    <link rel="stylesheet" href="../static/css/jquery.timepicker.css">
    <link rel="stylesheet" href="../static/css/quill.snow.css">
    <link rel="stylesheet" href="../static/css/daterangepicker.css">
    <style>
        body {
            background: #DFD3C3;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .container {
            display: flex;
            flex: 1;
        }

        .main-content {
            flex: 1;
            padding: 20px;
            box-sizing: border-box;
            margin-left: 0;
        }

        .edit-student-btn {
            background-color: #543310 !important;
            color: #ecf0f1 !important;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            font-size: 16px;
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .edit-student-btn:hover {
            background-color: #725238 !important;
        }

        #full-screen-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #C7B198;
            height: 200%;
        }

        #jaas-container, #video-container {
            width: 100%;
            height: 100%;
        }

        @media (max-width: 768px) {
            .main-content {
                margin-left: 0;
            }
        }
    </style>
    <script src="https://media.twiliocdn.com/sdk/js/video/releases/2.15.1/twilio-video.min.js"></script>
    <script src="https://8x8.vc/vpaas-magic-cookie-a916f02c258d4f8e9a5cbd7a4c30adc6/external_api.js" async></script>
</head>

<body>
    <button class="edit-student-btn" onclick="window.location.href='/dashboard'">Dashboard</button>
    <div class="container">
        <div class="main-content" id="main-content">
            <div id="full-screen-container">
                <div id="jaas-container"></div>
                <div id="video-container"></div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <div class="container-fluid bg-dark text-white-50 border-top py-4" style="border-color: rgba(256, 256, 256, .1) !important;">
        <div class="container">
            <div class="row">
                <div class="col-md-6 text-center text-md-right"></div>
            </div>
        </div>
    </div>

    <!-- Back to Top -->
    <a href="#" class="btn btn-lg btn-primary rounded-0 btn-lg-square back-to-top"><i class="fa fa-angle-double-up"></i></a>

    <!-- JavaScript Libraries -->
    <script src="../static/js/jquery.min.js"></script>
    <script src="../static/js/popper.min.js"></script>
    <script src="../static/js/bootstrap.min.js"></script>
    <script src="../static/js/simplebar.min.js"></script>

    <script>
        // Function to toggle sidebar visibility
        function toggleSidebar() {
            var sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('closed');
        }

        // JitsiMeetExternalAPI initialization
        window.onload = () => {
            const jitsiDomain = "8x8.vc";
            const jitsiRoomName = "vpaas-magic-cookie-a916f02c258d4f8e9a5cbd7a4c30adc6/SampleAppAdvancedArchitecturesInterveneNevertheless";
            const jitsiOptions = {
                roomName: jitsiRoomName,
                parentNode: document.querySelector('#jaas-container'),
                // Uncomment and add your JWT token if needed
                // jwt: "your_jwt_here"
            };

            const api = new JitsiMeetExternalAPI(jitsiDomain, jitsiOptions);

            // Twilio Video SDK initialization
            const accessToken = 'your_access_token_here'; // Replace with your actual access token
            Twilio.Video.connect(accessToken, { name: 'example_room' }).then(room => {
                console.log(`Connected to Room: ${room.name}`);

                // Add local participant's video track to the DOM
                room.localParticipant.videoTracks.forEach(track => {
                    document.getElementById('video-container').appendChild(track.attach());
                });

                // Listen for participants joining the room
                room.on('participantConnected', participant => {
                    console.log(`Participant '${participant.identity}' connected`);

                    // Add new participant's video track to the DOM
                    participant.tracks.forEach(track => {
                        if (track.kind === 'video') {
                            document.getElementById('video-container').appendChild(track.attach());
                        }
                    });
                });
            }).catch(error => {
                console.error('Error connecting to Twilio:', error);
            });
        };
    </script>
</body>
</html>
